# Build and test a Java project with Maven, and compute and report test coverage 

name: Java CI with Maven

on:
  push:
    branches: [ master , dev]
  pull_request:
    branches: [ master  , dev]

permissions:
  contents: read

jobs:
  build:
    name: building, testing and quality analysis
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest,macos-latest]

    runs-on: ${{ matrix.os }}

    permissions:
      # need write permissions for publishing the test report
      checks: write
      contents: write
      pull-requests: write

    steps:
    - id: checkout
      name: checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
      
    - id: setupjava
      name: Set up with Java 25
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: 25
        cache: 'maven'
        
    - id: mvn
      name: Build with Maven (including running all tests)
      run: mvn -B package --file pom.xml
      
    - id: testreport
      name: Publish Test Report
      if: ${{ always() }}
      uses: scacap/action-surefire-report@v1.9.1 
      
    - name: Generate JaCoCo Badge
      id: jacoco
      if: matrix.os == 'ubuntu-latest'
      uses: cicirello/jacoco-badge-generator@v2.12.1
      with:
        generate-coverage-badge: true
        generate-branches-badge: true
        generate-summary: true
        
    - name: Log coverage percentage
      run: |
        echo "coverage = ${{ steps.jacoco.outputs.coverage }}"
        echo "branch coverage = ${{ steps.jacoco.outputs.branches }}"

    - name: Create PR for coverage badge update
      if: ${{ matrix.os == 'ubuntu-latest' && github.event_name == 'push' && github.actor != 'github-actions[bot]' && github.ref == 'ref/heads/dev'}}
      uses: peter-evans/create-pull-request@v8
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: 'chore(ci): update coverage badges'
        title: 'chore(ci): update coverage badges'
        body: |
          Automated PR to update JaCoCo coverage badges generated by CI.
        branch: "ci/coverage-badges-${{ github.ref_name }}"
        base: ${{ github.ref_name }}
        add-paths: |
          .github/badges/*.svg
          .github/badges/*.json
        delete-branch: true


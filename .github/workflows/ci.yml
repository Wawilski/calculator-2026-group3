name: Java CI with Maven

# Trigger the workflow on pushes to main (including the, new "fix/division-by-zero" branch to see the workflow in action)
# and on any pull request targeting main.
on:
  push:
    branches:
      - "main"
      - "fix/division-by-zero"
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build and Run All Tests
    runs-on: ubuntu-latest

    steps:
      # Check out the repository code to the runner
      - name: Checkout source code
        uses: actions/checkout@v4

      # Set up JDK 25 and enable Maven dependency caching
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      # Execute tests using the Maven Wrapper.
      # 'sh' ensures it runs even if execution bits are missing.
      - name: Build and run tests
        run: mvn clean test

      # Save reports for debugging (available in the "Actions" tab)
      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: target/surefire-reports/

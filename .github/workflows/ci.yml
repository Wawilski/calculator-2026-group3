name: Java CI - Building and Testing

on:
  push:
    branches: [ "master", "feat/ci-build-test" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    name: Build and Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'
      - name: Build with Maven
        run: mvn -B package --file pom.xml